<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <!-- LLM API Settings -->
  <groupbox>
    <label><html:h3 data-l10n-id="pref-llm-section"></html:h3></label>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-llm-api-url"
        data-l10n-id="pref-llm-api-url"
        style="width: 120px;"
      ></html:label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-llm-api-url"
        preference="llmApiUrl"
        style="flex: 1;"
      ></html:input>
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-llm-api-key"
        data-l10n-id="pref-llm-api-key"
        style="width: 120px;"
      ></html:label>
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-llm-api-key"
        preference="llmApiKey"
        style="flex: 1;"
      ></html:input>
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-llm-model"
        data-l10n-id="pref-llm-model"
        style="width: 120px;"
      ></html:label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-llm-model"
        preference="llmModel"
        style="flex: 1;"
      ></html:input>
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-llm-temperature"
        data-l10n-id="pref-llm-temperature"
        style="width: 120px;"
      ></html:label>
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-llm-temperature"
        preference="llmTemperature"
        min="0"
        max="1000"
        step="100"
        style="width: 80px;"
      ></html:input>
      <html:label data-l10n-id="pref-llm-temperature-hint" style="margin-left: 8px; color: gray; font-size: 0.9em;"></html:label>
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-llm-max-tokens"
        data-l10n-id="pref-llm-max-tokens"
        style="width: 120px;"
      ></html:label>
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-llm-max-tokens"
        preference="llmMaxTokens"
        min="256"
        max="128000"
        step="256"
        style="width: 120px;"
      ></html:input>
    </hbox>

    <hbox align="center">
      <html:label
        for="zotero-prefpane-__addonRef__-llm-timeout"
        data-l10n-id="pref-llm-timeout"
        style="width: 120px;"
      ></html:label>
      <html:input
        type="number"
        id="zotero-prefpane-__addonRef__-llm-timeout"
        preference="llmTimeout"
        min="30"
        max="600"
        step="10"
        style="width: 80px;"
      ></html:input>
      <html:label data-l10n-id="pref-llm-timeout-hint" style="margin-left: 8px; color: gray; font-size: 0.9em;"></html:label>
    </hbox>
  </groupbox>

  <!-- Custom Prompts -->
  <groupbox>
    <label><html:h3 data-l10n-id="pref-prompt-section"></html:h3></label>

    <vbox>
      <html:label
        for="zotero-prefpane-__addonRef__-prompt-summary"
        data-l10n-id="pref-prompt-summary"
      ></html:label>
      <html:textarea
        id="zotero-prefpane-__addonRef__-prompt-summary"
        preference="promptSummary"
        rows="4"
        style="width: 100%;"
        data-l10n-id="pref-prompt-summary-placeholder"
      ></html:textarea>
    </vbox>

    <vbox>
      <html:label
        for="zotero-prefpane-__addonRef__-prompt-review"
        data-l10n-id="pref-prompt-review"
      ></html:label>
      <html:textarea
        id="zotero-prefpane-__addonRef__-prompt-review"
        preference="promptReview"
        rows="4"
        style="width: 100%;"
        data-l10n-id="pref-prompt-review-placeholder"
      ></html:textarea>
    </vbox>
  </groupbox>

  <!-- Test Connection -->
  <hbox>
    <button
      id="zotero-prefpane-__addonRef__-test-connection"
      data-l10n-id="pref-test-connection"
    />
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
